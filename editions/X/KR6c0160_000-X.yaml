body:
  text: 心經釋疑敘默壺氏閩產也有囊括宇宙之志慕司馬子長之為人足跡半天下所過名山大川并包胸臆乃茲遊浙上會稽探禹穴至止于武林武林蓋都會天下之多智多辯與百家眾技之流聚焉而逞以能自雄默壺氏惟愚惟訥若一無所能者神泠泠然清貌癯癯然古心恂恂然實蓋有道之士乎哉叩之則博通今昔而玄宗內典靡不參究尤長於堪輿家言壹稟於易故輿圖形勝如視諸掌甞自言曰易逆數也風水之勢亦取諸逆金丹之道又豈外於逆哉然猶滯形軀終歸幻化不若無相氏之超脫輪迴直登彼岸耳其所著述有心經釋義意尤未盡又著釋疑諸論如呼寐者而使之寤也愚夫愚婦皆可與知成佛作祖循言可入且世之詆佛者曰佛說無心心可云無默壺氏謂無諸妄心即佛無心也又詆佛教者曰有體而無用豈知色空不異之玅亦不外於世法果離世覔菩提者可同日語耶闢佛道之蓁棘為後學之指南有功空門豈曰小補予卒業是書愧不能如空生之了悟姑答有髮僧胡使君之請而為之敘萬曆丁亥春日瓊海浮槎生前進士錢塘許嶽撰
