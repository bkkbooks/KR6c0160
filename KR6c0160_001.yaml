body:
  text: 閩劍一笠道人嘿壺謝子觀光釋錢塘有髮僧了幻前進士胡孝校觀自在諸家註解皆以觀自在菩薩為句如宗泐之註以觀自在菩薩答舍利子所問訪諸佛會並無菩薩稱名觀自在者惟觀世音菩薩原名玅音係男子身乃東方淨光莊嚴世界淨華宿王智如來之侍者奉師命來此娑婆世界問安我佛及觀多寶佛塔兼聽法華經玅音具足一切細行無盡意菩薩以瓔珞供養未蒙佛示尚不敢受未領佛勑安肯越分當說法之大任乎即普門經亦是世尊對無盡意菩薩所說此觀自在必非菩薩稱名可知而舍利子為眾請問亦無可據奈何傳習滋久體認不明以觀自在三字忽不加意使佛說玄旨晦蝕於千百世之下良可痛傷儂志心經二十餘年實知此經玅在般若般若即觀自在之觀也世尊譬如醫王以一觀字為通聖散玅藥療眾生一切煩惱疾病信而服之必得自在之効耳大抵佛法以破相為宗了空為義而此觀者舍身之外何以哉蓋借假修真之法也使無此身則心無依附藉何而修但世尊恐眾生執著此身好生惡死故指為幻化之物係地水火風和合而成者也生前為饑寒嗜欲所誘妄作貪嗔等業是以不能脫三界輪迴之苦然此幻軀終歸敗壞惟一靈真性亘古常存人所當知當明者反日用而不知佛故說此破相之法雖言不及身而身已在其中矣今之釋流誤解其意往往厭惡此身謂無此軀即無煩惱此輩已墮斷見深坑故玄門嘲之為沒主孤魂者是也夫何玄門不明本性下手即滯軀殻又輸却禪家獨晉心本性者多矣豈知積精纍氣築基煉己若不明本性動輙為妄念所驅幻境所誘因此念不息而心不寧神不凝而氣不聚氣不聚則丹不成安可望夾脊雙關之有真造化乎此輩已墮常見之羅網佛甞訶為外道衲子嘲之為守屍之餓鬼也是以紫陽翁云未煉還丹先煉性未修大藥且修心心靜自然丹性至性清然後藥方成未甞不以心性之學捄其偏枯之失耳二流之病病則一般若悟觀自在與行深般若之法門者豈有如是之病耶此觀之觀乃觀無所觀之觀非迴光返照之觀也蓋纔著迴返便有處所既有處所即內有能知之心外有所見之境心境對待則行持易為斷續有不勝其疲者安得自在之効哉或有妄指身中一穴一竅而觀之者俱患能所之病皆非正大之觀也惟有大觀而無其所因其無所始得去住自由縱橫爽快雖曰無所惟不滯一切境物之所孰不知自有撥不開閃不得生成真實正大之所存焉出世者有此真所念始定心始虗欲始澄身始靜心虗身靜則輕安之玅不求自得實相之所不證自呈所以謂之寶所能居其所者則一切外緣事物皆如眾星而拱之此乃觀之體也然外緣雖假不能不應應之不忘其所則物有所表物自物而不能亂我之真回視斷緣簡事者落其下風矣此乃觀之用也若物無所表應之即生情識既成情識已是認物為真認物為真則欲火交熾塵勞蠭起即無觀物之玅而觀之體用俱失之矣此中之觀盡大地山河是沙門一隻眼總內外之大觀具此觀者六根六塵融作一大圓通地水風火翻成真如境正謂神丹一粒點鉄成金至道一言轉凡成聖如是觀者體用一如始獲實相真空自在圓滿之道也菩薩行深般若波羅蜜多時菩者菩提此云覺覺即佛也薩者薩埵此云有情有情識即眾生也詳言曰菩提薩埵略言曰菩薩此云覺有情也夫眾生覺性與佛無異但眾生歷劫已來因染習一切情識混正覺之性變作妄想以其雜念生生不息故曰眾生佛專謂之覺者因其覺性圓明純一無偽絕盡一切情識雖有情識悉轉為智光明普照如杲日當天常無變易惟佛所以獨謂之覺夫菩薩在佛與眾生凡聖二者之間何也彼雖具正覺覺而未純尚有微細情識未能淨盡故名之曰覺有情之菩薩也裴相國云終日圓覺未嘗圓覺者凡夫也具足圓覺住持圓覺者如來也欲證圓覺而未極圓覺者菩薩也夫三世諸佛之圓覺個個相同三界眾生之情識人人各樣十方菩薩之知見大小不齊故分為一十一地初地菩薩覺性光明略露一線象初三之月名歡喜地以其證聖位第二地菩薩名離垢地如初四之月謂其身心清淨矣第三地菩薩如初六之月光又大些以其大智已明名發光地第四地菩薩妙解廓照喻初七之月智慧漸顯名焰慧地第五地菩薩通達真俗二諦名現前地而其光明如上弦之月矣第六地菩薩之知見若初十之月明過於上弦以其功行超群名難勝地第七地菩薩有隨方應化之能名遠行地猶十一夜之月也第八地忍智如意名不動地第九地菩薩通力自在如十三夜之月光圓而未滿名善慧地第十地大智圓明蔭覆一切名法雲地猶十四之月也光雖圓而未望此十地菩薩如佛會中迦葉等類而其知見又不及文殊普賢觀音勢至等摩訶薩諸大菩薩之光明普徧無欠無餘似十五之月也此十一地菩薩優劣之階以其神通法力大小不同故耳三界一切眾生雖有貴賤賢愚而知見全是情識貢高故遮却自性光明即月之晦也全體暗昧如人無目因此觸物即黏皆成煩惱噫無緣得聞佛法正所謂萬古如長夜者此人也一切眾生若能行深般若之法亦可由初地之彼岸而至於十一地之涅槃也夫般若有淺有深淺者謂諸聲聞惟能空其心中之雜念不敢應物應則必為事物之法塵所礙彼惟得人空慧一深者是法空慧惟修菩薩道者能之謂其非但空心內一切煩惱照見身外一切事物塵勞之法悉皆空矣故曰法空慧行此深般若者心地瑩然情見氷釋居塵而不著有離塵而不著空如是之人始達深般若般若只是識得事物破不為其束縛便是智慧也夫塵世名利嗜欲魔境甚多非般若莫能碎其為戎首者莫過女色觀其艶質嬌姿何異長鎗短箭雲鬘霧鬂恰如套索飛撾秋波眼似鉄流星絳桃口似吹毛劒妖齒微微笑笑愚夫魄散魂消魔足悄悄搖搖好漢心忙膽戰究其敗德喪志之因只愛其肌膚之媚不覺已陷冶容之陣矣可謂智乎若具深般若之慧眼者將其皮毛爪齒臟腑觔骨氣血精津逐件提出細看一番是何者有動人處凡遇一事一物皆以此破相之法分而視之識破他那些粧點和合的意思始為法空之深般若縱到百年身後彼此悉為夢幻中人何故眼前痴迷留戀自污自累耶此破相般若始雖勉強久則自然迷則生死無窮悟則直登實際其玅在於行不行則彼岸不能到行字是此節之經眼諺云悟得一步行一步不行枉了說長安知之與行不可混說古人以知喻目以行喻足有目無足彼岸不到有足無目莫知所之般若今既知了若肯就行即時就得五蘊皆空之速效也照見五蘊皆空般若固在於行而五蘊又在於照不照則五蘊不空照之一字是此節著力之眼色受想行識之五蘊又謂之五陰陰者有蓋覆義又積聚義常常籠絡人心作貪嗔之業乃識神次第之階非五處所也色蘊是身外六塵之總名受想行識之四蘊是迷心次第之階級身外六塵之色人能先知而不受則色亦不能為心之蘊若在不受上用工夫第一省力則外之六塵內之六識即時兩頭跌落了此惟精進之人常得此樂懈怠之人心與塵合因與塵合則色已受於心故受為第二蘊受之不忘則想想時已落第三蘊想之不已則行行則已落第四蘊行則識其意味識蘊第五色已入心之深識則難忘觸境復起經云假使百千劫所作業不忘因緣會遇時果報還自受佛謂此五陰之身以識為本又謂識是生死種子者此也若能照破乎色則識根始斷而覺之源始清或疑五蘊皆空將謂身心事物竟歸幻化到底總是一箇空將心著在空境上牢牢搦住必使心如死灰全無知見自謂已有所得佛斥此輩悉無醫之病不思離了五蘊又著此空即此空亦是一蘊永嘉云棄有著無病亦然猶如避溺而投火六祖曰第一莫著空又曰有等迷人空心靜坐百無所思自稱為大此等迷人為邪見故不可與語此五蘊皆空之空陷了許多人悟不真者執心癡住而不若中鴆者鮮矣大都後學多墮此穽佛甞斥之為二乘者是然此空甚難形容儂謂譬諸瓶中注水則曰水瓶注茶則曰茶瓶若無茶水則曰空瓶雖曰瓶空但謂其瓶中無物非并其瓶而無之也夫人真心之中有五蘊則曰妄心無曰空心雖曰心空但謂其心中無五蘊非并其心而無之也佛家所謂無心者無一切妄想之心妄想無了真心見前但入門淺者不能驟見須陶冶日深方能豁悟有等師家離了五蘊又不著空却懸虗在那空有之間自謂外不著有內不著空已證中道可憐此輩已悉子莫執中之病夫五蘊空了必要有箇實際方可不然則無立命之所以為退藏之密此流雖有登雲步月之才終難迯此蘊迷之生死矣佛與眾生身心相類知見無殊五蘊皆同飲啄不異但眾生於五蘊中逐境遷流每被見思所惑搆地獄之因非不厭離因其不知為己之蘊從嬰至老認蘊為真蓋相緣相習與之俱化佛與菩薩於此五蘊隨流不染即於蘊中行戒定慧之佛事故不厭離亦不能離也既有此心必有五蘊喻乎魚不能離水離水即死虎不可捨山捨山即擒吾心之依五蘊亦猶是也五蘊固是不好之物事佛亦不能無但諸佛菩薩知見正大皆變為美德懿行亦與之俱化也六祖曰佛法在世間不離世間覺離世覔菩提恰如求兔角要學佛者須將從前一切所愛之事物自今漸漸疎淡得下則生死惡業亦漸漸解矣即是在家出家之佛子也度一切苦厄苦厄即是世間功名勢利男女飲食一切嗜慾之境人皆貪求無厭遂有求不得苦既得又有悉失苦愛別離苦冤憎會苦生老病死無非是苦凡有身者皆有此苦惟具實相者即不為其所苦何也蓋預知其為幻化得固不喜失亦不憂與物同求而不同貪與物同得而不同失處世如斯何苦之有故曰度一切苦厄舍利子佛之弟子千二百五十人內有十箇大弟子各具一才之長如須菩提則解空第一阿難尊者聲聞第一目犍連孝行第一羅睺羅密行第一此舍利子則智慧第一佛凡說深奧之經及難信之法即召舍利子為問答也舍利乃西天鳥名其鳥眼見疾捷尊者在母胎時其母慧辯異常眾即知其所胎者乃聖人也故名其母曰舍利尊者出世辯才無侶因其母名舍利故曰舍利子即舍利弗也佛說彌陀經乃是難信之法亦召之而為問答或以身心喻者皆非也色不異空空不異色色即是空空即是色受想行識亦復如是小乘之人疑此五蘊是實有之物事因被他擾此心不得自在直須忘了他心始輕快此皆眾生之倒見佛說此節以破其疑也佛謂非但色蘊就是真空之性即受想行識之四蘊亦與真空之性一體謂即此五蘊就是真性不用揀擇去取又莫糊塗全無分別賢首曰真俗雙泯二諦恒存此節因上文說五蘊皆空恐人認作實有五蘊可空夫蘊之為眚有名無實變易無常隨生隨滅晝夜何可數計但聲聞等人為其所苦不能控制故以其為有也豈知迷為境轉即是五蘊悟則轉境即是真空因能轉境則心不留一物雖酧酢萬變不為累贅故曰真空真空却能空五蘊五蘊不能壞真空真空是實蘊識是幻幻依真有真不幻無幻中有真真中無幻後之學者欲證真空之性切勿憎嫌五蘊要在二六時中念念精詳參究嚴查即今一念看在那一蘊上著脚即如捉賊定要獲賍纔罷如此操持始能超脫生死關身心不為五蘊所礙始謂之真空又謂之實相法華云佛種從緣起是故說一乘未悟實相未可便以蘊識為性古人謂之認賊為子者是也切勿驅遣蘊識以求真性古人謂之捏怪者是也老宿嘲認識神者曰無量劫來生死本癡人認作本來真儂續其末云若離此識覓菩提畢竟無由出六塵六祖曰煩惱即菩提賢首序云良以真空未嘗不有即幻身之有以辨於實相之空一切事物之幻有到底未始不空即此事物之幻空以明其實相之真有幻有之有有形名為常有實相之有無質乃是空有故曰不有虗空之空無質名為斷空真空之空有象乃是有空故曰不空不空之空空而非斷不有之有有而非常四執既亡百非俱遣般若玄旨斯之謂歟是諸法空相諸者眾也法者即事物之總名此節因上文色不異空而言恐人執著斷空故曰諸法若是空了定要顯出一箇實相纔好若不見實相即是斷空又名無記空世間有等利根外道掃去一切塵緣現前知見不過只是空境遂執此境而為真空噫認境為真非棄有著無而何又有等師家外不著有相內不著空相將心擴大以含沙界自謂佛性本來如此大每舉古公案云佛性多少大量周沙界云云噫此師雖知大而不知小又患曠蕩之病豈不聞佛曰大周沙界小入毫芒真性原無定量圓即圓而方即方六祖曰體同虗空亦無虗空之量大槩墮著有著無曠大等之知見者多是隨人脚跟轉佛甞訶之為逐磈韓獹若是獅子則逐人矣學者若能空了塵勞諸法工夫已到百尺竿頭危峻極地若更進一步不墮塵勞苦海必墮茫蕩空坑古人謂生死岸頭者此也忻然撒手孰敢承當更進一步要有一個快活安穩之道場始有立命之處所方能穿透一切之宗教始知學者根器之大小方可絕學罷參接引未悟之人倘或未然安得不鑽故紙而求出世之方乎得此更進一步之階者動靜寂寂性相如如去住自由色空無礙抱子弄孫無非佛事山林朝市總是道場華嚴云上覺無來處去亦無所從清淨玅色身神力故顯現六祖曰即此相離此相儂曰不即不離即是真空實相佛謂之空如來藏者此也寶性論曰有四種人不識空如來藏如生盲人一凡夫二聲聞三緣覺四初心菩薩皆不識實相之空如來藏昔黃梅會上五祖要無相偈秀師謂身似菩提樹身既為樹了却將何者為菩提心如明鏡臺心既為臺了又將何者為鏡詳其似如二字已是不知本來面目非但身心兩無下落頭上安頭且又露出身心兩字非抱賍叫屈而何予見秀師搭臺待六祖來搬戲倘非秀師先作一箇頑木吾知六祖亦無施斧鑿處撞著那個舂米漢一生極會討便宜的看他說得何等自在菩提本無樹渾身俱是菩提又分何者為樹明鏡亦非臺心為明鏡了更有什麼臺本來面目即是實相實相之中原無一物何處惹塵埃此偈解者多作空猜儂見句句切實舉此二師故事特證法空之相此相人人本具個個圓成不勞訂議鋪排在人善用不善用耳不生不滅不垢不淨不增不減思慮不滅謂之生生即不滅之異名雜念不生謂之滅滅乃不生之假號此不生不滅因遣上文之疑而發也謂五蘊皆空則念慮已滅慮滅則空相已頓現了惟初機莫能見恐其偏執於滅疑此念滅即是空相隨次即呼舍利子而說色不異空謂色等諸蘊與空相不異以遣其執滅之疑不但色空不異又曰色即是空謂五蘊就是真空不要分別彼此蘊乃生生之念又恐學者偏執生生之念即是空相復於此節總遣二疑故曰是諸法空了之空相雖不是生亦不是滅此乃世尊以不生不滅等直指實相此法惟佛能知惟佛能說凡諸經中文字譬如佛之手指人之真性譬如空中之明月喻佛以指指月示人人能離指觀月則月在空而不在指雖不在指所見月者賴指之指也倘若不知離指以觀空中之月即執佛之手指以為月者斯人非但不識月亦不識指耳此生滅垢淨增減三段法端若佛之手指也以指人人身中空相之性此真空實相宗門言語道斷一字不立縱善言者亦直下無開口處此相又非窈冥深奧難知難見者却是個至簡至易平平直直之物事只要人自會自悟不由師授不因法得而得者名衣中珠若從師授法得者由聲聞而得古人謂之從門入者不是家珍以其取之有盡用之即窮故佛於金剛經屢云我於燃燈佛所若有法得阿耨菩提燃燈即不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故燃燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼古人謂說一禪字拖泥帶水說一佛字滿面慚惶有等鈍根懶學之人一聞宗門不用文字即掃除一切佛法噫譬未識月之人即棄指月之指斯人雖歷沙劫終無識月之期悲哉豈不聞總持雖無文字文字能顯總持外道每每以宗教分為兩段豈知教為宗設宗因教明滯宗焉能達教絕教無以明宗宗教相須勿執為上孰云教內無宗此中空相名為何物非特此也凡有言說皆說宗也佛說不生不滅以指空相學者若悟空相之宗者始知不生不滅即空相之範圍也若明不生不滅一隅之義者則垢淨增減二隅之理觸類可知矣無眼耳鼻舌身意此節乃形已下之法也六根所謂無者不是沒有了見今能食能言六根如何無得蓋百姓不知身中自有真心只見有世上聲色臭味故其心或隨目走或逐耳去終日只在門外奔忙故有六根道人既悟其空則六根併作一根不為聲色所誘流轉故曰是故空相之中無此眼耳鼻舌身意六根之累也無色聲香味觸法眼對色耳對聲鼻對香舌知味身能觸身之為根乃形骸手足玉莖之總名觸即蹴打衝撞也意之根主思思即法也內而妄想外而事物及諸經文皆法也法乃意根之塵在他處為方法之法也有身心而不自知者即名眾生眾生性迷惟知身外之六塵悟性之人念念不離身心雖不灑掃六根清淨則塵自塵與我六根全無干涉故曰是故空相之中無此色聲香味觸法六塵之擾也無眼界乃至無意識界此節乃十八界之法佛總略而言若欲詳言該說無眼界無耳界無鼻界無舌界無身界無意界此六根之界又無色界無聲界無香味觸法六塵之界又無六識之界眼識色是一界耳識聲鼻識臭舌識味身識觸意識思想之法此根塵識總為十八界界者乃界限之界如區也即十八處也一區各具一種才能以其伎倆不相兼混譬眼之根惟能與色對與聲却無千色之塵惟與眼相知不能令鼻見耳之識惟能識聲不能識味舉此數界餘可例知十八界中皆是眾生作業之所喻十八重地獄也悟性之人變地獄作天堂改貪嗔痴作戒定慧界界皆化為光明淨土夫六塵六根喻水六識喻藥水飯無決不成酒根塵無識決不成業世尊教人變識為智智即真空識既轉為真空則識已無矣根塵若無情識以媒合之則根自根塵自塵安能顛倒真空乎故曰是故此空相之中無十八界之法也無無明亦無無明盡乃至無老死亦無老死盡此十二因緣之法與五蘊之法一般但五蘊只有五重此十二因緣從淺入深有十二重以無明為始無明者乃是牽眾生入地獄第一個迷魂鬼出世之士若得此無明破時則僊佛可期矣人心纔有些些喜怒之情生即是無明心不着物則喜怒由何而生夫眾生之心個個都是光明的只為着了聲色就遮却那些光明人若失了這般光明眼睛雖是張開營營者全是做夢一切煩惱魚貫而來繼使知得是夢抖擻踊躍亦不能醒隨即睡去此乃眾生入地獄之因也無明可不破乎欲破之者須伏般若之慧劒在手撞着來的聲色無分好惡一個一劍揮為兩段直欲到無下手處無明之網始碎矣無明與智慧一勝則一負不相兩立智慧略放從容無明繼踵即至故不可說無明無矣無明既不可說無則無明盡盡之一字更不可說也無明既不可說盡而老死可說其盡乎故曰空相之中亦無老死盡無苦集滅道此四諦之法乃形而上之法為大乘人之法器也苦集乃處世間之惡因果苦為報受之果集為造苦之因先示苦果令人知而可次示集因令人斷而勿為譬諸積不善之家是集因也必有餘殃是苦果也因集聚不善所以招餘殃之苦此滅道二諦乃出世間之善因果滅是出世之果謂得滅果者一切妄想雜念蕩然不生謂之滅先示滅果令人慕此安淨次示八正道令人進修八正道者正語心口相應正業無非佛事正命俗習已除正思惟無諸妄想正方便不逆人意正念心無異緣正定身心不亂能修此八正道之因則滅果不求而自得此四諦之法固為輕便優於諸法佛謂若悟真空之人集因不斷而自斷苦果不而自無自有菩提之智果則滅果不足慕也世間八萬四千塵勞悉歸真空之正覺何八正道之足言故曰空相之中無四諦之法也無智亦無得以無所得故菩提薩埵依般若波羅蜜多故心無罣礙云云至三藐三菩提智即般若之慧眾生內之妄想外之塵勞皆賴般若之智以照破其為虗幻始得證空相之理塵妄既空空相錐現尚有般若之智及所得之理以混之似未怜悧亦當漸次而去則實相昭然而無淆絆故曰無智亦無得學者到此則涅槃菩提之果已得佛又說以無所得故菩提薩埵作什麼蓋恐其疑成佛成菩薩乃大聖賢之果位豈止只此無智亦無得一言以蔽之耶孰不知無諸妄想塵勞已得人空之智慧了今造至無智亦無得之地位已得法空之智慧矣到此不證貫相之果位更待何時而證也此無所得之地位亦非尋常可到者所以佛引菩薩及三世諸佛原無所得果之因皆以無所得之故而得涅槃菩提之果也以釋學者之疑此乃世尊叮寧引證付囑之意沾佛慈雨以萌宿世善根者可忘所自乎此無所得之妙旨學者宜潛神熟玩久之始得其受用矣夫佛說顯般若前言已盡而下文又說密般若何哉蓋世尊憫念行人理造法明而貪嗔殺盜淫業惡緣厄難不消屢屢明知故作障亂心由遷延歲月直至皓首無成者皆由宿生冤業蔕固根深芟而復萌壞人善行以妨進道故又說此呪令人持誦即能暗遣前愆直登覺岸爾此猶世尊愛人無已之心故稱為三界之慈父也故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗故說般若波羅蜜多呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶凡謂之呪者皆是諸天鬼王魔王降其部屬之祕語今焉護佛法會無可以献世尊各將統馭部下之密呪供奉我佛倘其部屬鬼神惱亂眾生但誦其呪則諸冤魔自退其義如此學者何疑此無解說雜藏中有譬云昔有長者一奴迯於異國國王以公主妻之奴常作驕態鄉人從其國歸報長者知因往視奴迎入內庭謂公主曰此乃吾父也自此奴態不作一日長者欲歸公主竊告之曰爾兒出身富貴甚難奉侍乞示一法長者云我有一呪去後復你態時汝但以一手指前一手向後作個勢子對他念呪二句你無親往他國誑惑一切人態若不止再念後二句你侖合吃粗食如何頻作嗔念此態即止矣公主求解說長者云祕語不可解但念則有力長者歸奴復作態公主如法念呪奴態即止奴意自謂區之脚色出處長者必告公主知自此不復作態凡呪之義大槩如此夫呪之音不可曉皆諸天龍神之梵音當時譯經之師但譯字而不譯音者何蓋為要此梵音諷動始有神力學者信而持之必獲捍厄之効梵音尚不敢譯豈可更為之解說乎每見解者悉以己意妄註無稽後之同志者但當信受行持以為出世之怙恃始不負世尊之慈旨云問涅槃又曰無餘涅槃是死非死歟涅槃不是臨死時謂之入涅槃學者要除妄想眾生之念必須先立涅槃然後始能度諸妄想若死了是涅槃則妄想又何用度金剛經云三界九地四生六道一切眾生我皆令入無餘涅槃而滅度之若涅槃是死則佛死一切眾生豈其心哉又曰涅槃心易了差別智難明詳此涅槃心差別智其不是死可知此涅槃者即是真空實相之體乃法中之王學者有此涅槃之法則六度萬行四諦止觀諸法一總都在其中矣但恐緣輕孽重根鈍及從事未久者莫能驟然即證亦有言下即證者在人疑信如何爾夫涅槃有二種若辟支獨覺羅漢二乘之人了生死亦有涅槃謂之有餘涅槃又曰小涅槃彼之工夫遠避喧嘩斷棄人事深居獨處志在淡去一切妄想雜念久久亦成個寂然不動就謂之涅槃雖曰涅槃因其尚埋下有前件塵勞未服甞防聲色名利為歒故謂之有餘涅槃亦猶永之詐死終不能度鉛關這樣工夫斷然不敢應酬人事恐搖其寂寂之心故防聲色如冦讐畏人事如桎梏一切事物塵勞之境雖暫時不動被其以寂定之氣制住在那裡如大石壓草苗雖不茁生意猶存這樣涅槃只可迯生死不能了生死又不可全然說他不是視凡夫闡提輩浮沉生死者何啻霄壤之殊乎夫十一地諸菩薩所建大涅槃謂之無餘涅槃彼之事業住寂而非趨寂了喧而不避喧處寂寂之涅槃遊喧喧之世界則世界亦寂寂以其無有一切聲色塵勞可避可畏如是則眾生之心已度盡矣始謂之究竟涅槃或遺一事一物微有留戀即此一個眾生不度亦是有餘直到無一毫妄想眾生之念可度了始謂之無餘佛云若有一眾生不得度者亦不成佛正此義也經云如來證涅槃永斷於生死既斷生死豈更有死乎學者宜自研參證諸佛典慎勿隨人脚跟轉世間菩薩間世而生無處借問各自打點津梁不可因循度日百年身世有限光陰噫此身不向今生度更向何生度此身珍重珍重問何為真空又曰實相又云空相又曰真性一與二與答詳言謂之真空實相略言謂之空相總是本來真性之異名也身之形相乃載道之器無身則心無依無心則身無主心為身主故名曰性身有心主則實故謂之實相佛經性字以心主為性乃譯師特存大義耳身若無心以主之則虗虗則謂之幻相又謂之妄身心依乎身自然離却一切聲色名利之妄其心即空耳心空即無幻偽以雜之故曰真空心空非但心真心空則身無為而安逸渾無累如是則身亦空矣身心俱空又有身心可以指實非真空實相之性而何二乘擯亡身心而著空見之境豈可與真空同日語矣夫四大色身見在生成不用打點惟心難見難悟因心不悟則妄想蝟集所以佛說一切法門只是教人明其本心則習氣妄業自消而如來之藏即現不行一切苦行亦可脫生死之苦厄佛恩高大昊天豈足喻哉然佛恩何以見其大佛得實相之法非是今生而得也皆由前劫千萬世中不論大小法門逐件逐件行過試過始知此實相之法為法中之王後學得此法者則一切苦行俱不用行靜而思之佛為我等後世佛子省了許多力氣兌了許多生死苦得之者知其勞苦始為報佛之恩譬如投身餒虎割肉喂鷹捐軀節節支解捨身以換半偈之類皆其苦行也佛脩種種苦行為求出世之法我等今得實相法王固當思其源也古德云將此身心奉塵剎是則名為報佛恩不思佛恩者即非佛子也後學得遇此實相法門者猶隻眼龜值浮木孔何也却有三難人身難得中土難生佛法難遇凡有血氣者皆有身也何獨以人身為難得蓋人身與佛同類佛法有在人間須得人身然後得聞其出世之法耳每見與佛無緣者萬劫不聞佛名字何由預聞其法乎既得人身又要生在中國若生偏方下賤之地則無佛法可聞故曰中土難生假饒得生多為世境牽纏忙忙過了一世無暇去聞佛法亦無心去聞佛法故曰佛法難遇既聞佛法法海無涯略說其門亦有八萬四千惟此實相法門又難遇中之難遇也金剛經云若復有人得聞是經信心清淨即生實相當知是人成就第一希有功德天地之間惟人為貴人之有生身心為重休戚痛癢內外相關所謂切親莫過於此世人不知可貴悉以功名利欲之假反累其身營營汲汲終日馳求無時休息所以世尊為此一大事因緣出見於世憫諸眾生說種種妙法令其反邪歸正背假從真誠使知身是載心之寶心是潤身之珍一失人身萬劫難得日月云邁雖悔可追今之釋流視此身如贅疣者何哉彼以皮囊歌曰這皮囊多滯礙與我靈臺為悉害隨行隨步作機謀左右教吾不自在要飯吃要衣蓋又要榮華貪世態使我心驚不得間為你結下冤家債豈知六祖此歌乃解眾生執身怕死之疑說此破相之法警人捨無常之身世務存常住之真心𮨇不悟祖意之由以此皮囊真可厭惡遂有投崖赴焰蹈水就兵輕生如敝屣者意謂無此幻軀便無衣食寒暑之累殊不知心地未明而死心上還有許多妄想情識未了又要出殻入殻復來人世四生之中以了妄念試將慧眼觀之此等惟圖貴高之名不師知識善友流弊至此又不念歌末有曰尿屎渠膿血聚算來有甚風流處九竅都為不淨坑六門盡是狼藉戶𢓥彿中間解悟時皮囊變作明珠舖斷慾心須堅固料我身從愛慾生慾心斷絕無來去內藏一顆大明珠晝夜光明自認路此六祖變大地作黃金攪長河為酥酪假四大作化城在行人迷悟如何耳佛家所謂出世之法者無他蓋言人人皆可成佛所以不成者皆因身口意三根常染貪嗔癡之三業三業分之則為十惡夫身根有三業殺盜淫是也意有三業貪嗔癡是也口有四業綺言誑語兩口惡舌是也縱此十惡者即是自種地獄之因若能轉十惡為十善者報盡決生天堂可不慎哉有等僧家通宗達教知因識果怜悧多能外習僧儀內心如俗此等十惡隨懺隨作無有了期自謂仗佛之力必能為其消滅及至禍報臨身惟恨佛無靈驗噫豈不聞佛手難遮業報乎要在當人懺露其前愆悔其將來不可復作如是則佛果可覬耳有等師家學得一部等韻者搬得一場焰口者記得幾則公案者曉得幾卷經鈔者搦住念頭不動者各自謂己得宗門法要得達磨不立文字之的旨掃去一切佛法瞽惑無知增其上慢亦學老宿拈搥竪拂粧模作樣賣弄伽陀成群結黨自立門墻眼底無人自若釋迦再生方十之中名利人我俗業猶故行狀如斯教門不幸因此被檀那覿破致賤之如禽獸斷他善根損人信念壞佛清規良可歎恨佛今示寂四千餘年象教彫零已極釋種固多波旬不少求其不貪不妬者誠若沙裏覔金十方善信慎勿見他過咎阻自己前程此輩戒行雖虧亦名佛子既敬泥塑木雕之佛紙印筆寫之經此特二寶更有僧寶必要人作以配佛經方成住世三寶此三寶者乃眾信之福田種慧之腴地非修橋補路之福可比恭敬三寶福報無窮今人但知敬佛與經而槩以俗僧慢之豈不是自家福田之缺典歟即如俗僧亦不可擯斥亦不可盡謂無人也六祖曰他非我不非又曰若見他人非自非却在左諺云僧來看佛面彼雖不潔亦是我之福田安可自棄乎古云敬幻僧致真僧說法拜泥龍感真龍行雨經云欲報白鵶恩須施烏鵶食寄語吾家法眷降伏見在貢高身既出家心當離欲精嚴戒行誰不欽尊一念不紛五香自噴退後一著地步自寬佛子家風惟宜朴淡飢寒之外勿可有思誠能安分如斯庶幾自他兼利問佛家亦續人倫否答佛教謂之出世法違離世俗務在存心所以不能兼續綱常甘受異端之貶彼非不欲全其勢不可兼得也近有外道妄議釋迦亦續人倫妻曰耶輸子羅睺羅後世釋流斷倫續者皆失其傳也予試舉一二大端為辯則其詭詐觸類可知佛既重倫必當為子婚娶何使羅睺披緇斷髮棄國嗣而為首僧此一不足信也佛為教主衣鉢親傳迦葉授受為萬世之模須置室家以攻四業何使圓頂方袍孑侍佛座終身此二不足信也佛會天人雖多不出四眾落髮出家無妻之男子謂之比丘無夫落髮之女人名比丘尼在家有妻有髮之弟子曰優婆塞有夫有髮之女弟子曰優婆夷明有出家在家僧俗之分盲師何可妄議此不足信者三也又見其掠取道家以神馭氣之權術指作太極河圖鼓人想圓腔於中脊謂之艮背運呼吸於臍輪名曰行庭以佛家萬法歸一歸此一氣種種宗教揑入運氣旁門妄大自尊師稱三教非惟援儒入佛分明左道惑人野狐固自知其難媚叢林之獅象孤螢不自揣始衒耀欲齊於兔烏後學毋穽其愚各自猛加警醒般若心經釋疑後序唐貞觀間釋玄奘使西域取經至罽賓國道險虎豹邪魅無可誰何忽見一僧瘡痍形穢口授心經一卷令奘誦之遂得山川夷曠道路自通虎豹藏形魔魅潛跡此心經之所從來而般若呪力神通廣大能度一切苦者居然足證云予雅愛是經其詞簡其義精口念心惟茫無畔岸罔知津涯盡取諸家註解讀之愈晦而愈疑自愧性根鈍暗皇皇如也歲乙酉幸遇延平謝默壺先生悃幅無華了無人我蓋深於禪者傾蓋語相視莫遂叩之儒已入愿中心學之室予乃長跪質疑曰學人每誦心經未了經義但依文誦念而已願先生發菩提心為鈍根者說先生曰君說依文誦念恐文亦未明依何誦讀且世尊說經皆以如是我聞為首此經云何予曰觀自在菩薩先生囅然笑曰君開口便錯一得之愚請以就正夫此經二百六十個字括盡藏中妙義詠大小乘法學者須字字句句悉心體認世尊的傳心印之要訣超脫生死之徑門單闡般若為宗故以觀自在三字為句冠於經首彼之般若即此之智慧慧即觀也能觀之者則真空實相之道不在經文在方寸中矣何自在之不可得何苦厄之不可度哉古謂金剛經為大藏經之骨髓愚謂心經尤金剛經之血脉也吾為君敷衍經義捃摭前聞間亦竊附己意名曰釋義又撮可疑者次第陳之名曰釋疑君能隨文理會口誦心行則胸中宿結自爾豁然始悟蘊識即是真如真如不外識性噫能仁祖曰此五陰身以識為本識為萬妄之根源非十二因緣十八界四諦諸法所能轉惟具般若深慧者覺體圓明自能了了故曰千日學法不如一日學般若般若一門能攝一切諸法經中故指一切諸法皆謂之無惟此般若為法中之王十一地菩薩依之而證涅槃三世諸佛依之而得正覺後世欲濟菩提之彼岸者可捨般若之舟楫耶是以經名般若波羅蜜多心經予領先生玅旨跪而誦之朝夕不輟乃因先生自敘巔末以弁諸首遂梓而傳之願與善知識同登彼岸萬曆丁亥歲浴佛日賜進士出身中順大夫直隸徽州府知府前禮部主客清吏司郎中仁和順所胡孝撰
